<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande envoyée — Charbonnet Advanced Design</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px;
}
.card {
  text-align: center;
  max-width: 480px;
}
.check {
  width: 72px;
  height: 72px;
  background: #e0f5f2;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 32px;
  color: #00b8a6;
  font-size: 32px;
}
h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 42px;
  font-weight: 800;
  color: #1a2332;
  margin-bottom: 16px;
  line-height: 1;
}
h1 em { font-style: normal; color: #00b8a6; }
p {
  color: #5a6e85;
  font-size: 16px;
  font-weight: 300;
  line-height: 1.7;
  margin-bottom: 8px;
}
.mono {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #8a9db5;
  margin-top: 24px;
  margin-bottom: 40px;
}
a.btn {
  display: inline-block;
  background: #00b8a6;
  color: white;
  padding: 14px 32px;
  border-radius: 3px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .8px;
  text-transform: uppercase;
  transition: background .2s;
}
a.btn:hover { background: #009688; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Demande<br>envoyée avec <em>succès</em></h1>
    <p>Nous avons bien reçu votre demande de devis.</p>
    <p>Nous revenons vers vous <strong>sous 48h</strong> avec une proposition chiffrée.</p>
    <div class="mono">// contact@charbonnet-advanced-design.fr</div>
    <a href="https://charbonnet-advanced-design.fr" class="btn">← Retour au site</a>
  </div>
</body>
</html>
